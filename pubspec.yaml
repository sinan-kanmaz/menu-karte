name: qrmenu
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  firebase_auth: ^4.15.3
  riverpod_annotation: ^2.3.3
  url_strategy: ^0.2.0
  nb_utils: ^6.1.0
  flutter_localizations:
    sdk: flutter
  intl: any
  firebase_core: ^2.24.2
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0
  hive_flutter: ^1.1.0
  image_picker: ^1.0.5
  firebase_storage: ^11.5.6
  firebase_database: ^10.3.8
  file_picker: ^6.1.1
  cloud_firestore: ^4.15.4
  share_plus: ^7.2.1
  screenshot: ^2.1.0
  qr_flutter: ^4.1.0
  flutter_svg: ^2.0.9
  printing: ^5.11.1
  path_provider: ^2.1.2
  pdf: ^3.10.7
  flutter_app_icons: ^0.0.9
  firebase_analytics: ^10.8.5
  cloud_functions: ^4.6.8
  scrollable_positioned_list: ^0.3.8
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_flavorizr: ^2.2.1
  flutter_native_splash: ^2.3.9
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flavorizr:
  ide: "vscode"
  app:
    android:
      flavorDimensions: "flavor-type"

  flavors:
    dev:
      app:
        name: "Qr Menu Dev"
      android:
        applicationId: "com.qrmenu.dev"
      ios:
        bundleId: "com.qrmenu.dev"
      macos:
        bundleId: "com.qrmenu.dev"


    stage:
      app:
        name: "My Digi Menu Stage"

    prod:
      app:
        name: "Menu Karte"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/svg/
